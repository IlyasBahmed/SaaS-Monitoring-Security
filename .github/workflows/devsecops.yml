name: DevSecOps Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo, pdo_sqlite, sqlite3
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache Composer Dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-

      - name: Cache Node Modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Install Composer Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Install NPM Dependencies
        run: npm ci

      - name: Build Frontend Assets
        run: npm run build

      - name: Prepare Laravel
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Create SQLite Database
        run: |
          mkdir -p database
          touch database/database.sqlite

      - name: Configure Environment
        run: |
          echo "DB_CONNECTION=sqlite" >> .env
          echo "DB_DATABASE=$(pwd)/database/database.sqlite" >> .env

      - name: Run Migrations
        run: php artisan migrate --force

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --memory-limit=1G

      - name: Run PHPUnit
        run: php artisan test

      - name: Upload Vendor Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vendor
          path: vendor

      - name: Upload Node Modules Artifact
        uses: actions/upload-artifact@v4
        with:
          name: node_modules
          path: node_modules


  security:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Vendor Artifact
        uses: actions/download-artifact@v4
        with:
          name: vendor
          path: vendor

      - name: Download Node Modules Artifact
        uses: actions/download-artifact@v4
        with:
          name: node_modules
          path: node_modules

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Run Composer Audit
        run: composer audit

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2

  container-security:
    needs: security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t laravel-app .

      - name: Scan Docker Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: laravel-app
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
  
  # dast:
  #   needs: container-security
  #   runs-on: ubuntu-latest

  #   permissions:
  #     contents: read
  #     issues: write

  #   steps:
  #     - name: Checkout Code
  #       uses: actions/checkout@v4

  #     - name: Run OWASP ZAP DAST Scan
  #       uses: zaproxy/action-baseline@v0.15.0
  #       with:
  #         token: ${{ secrets.GITHUB_TOKEN }}
  #         target: ${{ secrets.STAGING_URL }}
  #         docker_name: 'ghcr.io/zaproxy/zaproxy:stable'
  #         fail_action: true
  #         allow_issue_writing: true
  #         artifact_name: zap_scan_report
  #         cmd_options: '-a'

  deploy:
    needs: container-security
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_IP }}
          username: azureuser
          key: ${{ secrets.SSH_PRIVATE_KEY }}

          script: |
            cd /opt/project
            git pull origin main
            docker-compose down
            docker-compose up -d --build
