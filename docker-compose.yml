version: '3.8'

services:

  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: laravel_app

    restart: unless-stopped

    working_dir: /var/www 

    volumes:
      - public_data:/var/www/public
      #  - .:/var/www

    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL:  https://7arfati.dpdns.org
      APP_KEY: ${APP_KEY}
      MAIL_MAILER: ${MAIL_MAILER}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_ENCRYPTION: ${MAIL_ENCRYPTION}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME}
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: ${GROQ_MODEL}
      
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
      CLOUDFLARE_BASE_URL: ${CLOUDFLARE_BASE_URL}
      WPSCAN_API_TOKEN: ${WPSCAN_API_TOKEN}
      LOG_CHANNEL: stack
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: laravel
      DB_USERNAME: laravel
      DB_PASSWORD: secret
      CACHE_DRIVER: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: database
      MONGODB_URI: mongodb://mongodb:27017/saas
      SESSION_HTTP_ONLY: "true"
      SESSION_SAME_SITE: lax
      SESSION_SECURE_COOKIE: "false"

    depends_on:
      - postgres
      - mongodb

    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - public_data:/var/www/public
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./cloudflare/origin.pem:/etc/ssl/cloudflare/origin.pem:ro
      - ./cloudflare/origin.key:/etc/ssl/cloudflare/origin.key:ro
    depends_on:
      - app
    networks:
      - app-network

  postgres:
    image: postgres:16-alpine

    container_name: postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: laravel
      POSTGRES_USER: laravel
      POSTGRES_PASSWORD: secret

    volumes:
      - postgres_data:/var/lib/postgresql/data

    ports:
      - "5432:5432"

    networks:
      - app-network

  mongodb:
    image: mongo:7

    container_name: mongodb

    restart: unless-stopped

    volumes:
      - mongodb_data:/data/db

    ports:
      - "27017:27017"

    networks:
      - app-network

  queue:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: laravel_queue

    working_dir: /var/www

    command: php artisan queue:work database --sleep=3 --tries=3 --timeout=90

    restart: unless-stopped

    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY}

      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: laravel
      DB_USERNAME: laravel
      DB_PASSWORD: secret

      QUEUE_CONNECTION: database
      MONGODB_URI: mongodb://mongodb:27017/saas

    volumes:
      - .:/var/www   # 🔥 مهم جداً

    depends_on:
      - postgres
      - mongodb

    networks:
      - app-network

volumes:
  public_data:
  postgres_data:
  mongodb_data:

networks:
  app-network:
    driver: bridge